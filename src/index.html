<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#e8002d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Matt Money" />
  <meta name="description" content="Personal financial command center — F1-style money tracking" />

  <title>Matt Money</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="icon" type="image/png" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- setup-screen intentionally removed — app opens immediately, no setup required -->

<!-- ── Main App Shell ──────────────────────────────────────── -->
<div id="app-shell" class="app-shell">

  <!-- Header -->
  <header class="app-header">
    <div class="header-logo">
      <div class="header-logo-mark">M</div>
      <span class="header-logo-text">Matt <span>Money</span></span>
    </div>
    <div class="header-actions">
      <span id="header-month-display" class="month-display" style="font-family:var(--font-display);font-size:13px;font-weight:600;letter-spacing:.04em;color:var(--text-secondary)"></span>
      <button class="header-btn" id="settings-btn" title="Settings" aria-label="Settings">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
  </header>

  <!-- Main content area -->
  <main class="app-main" id="app-main">
    <!-- Views injected by JS -->
    <div id="view-dashboard"></div>
    <div id="view-add" class="hidden"></div>
    <div id="view-transactions" class="hidden"></div>
    <div id="view-simulator" class="hidden"></div>
    <div id="view-patrimonio" class="hidden"></div>
  </main>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav" role="navigation" aria-label="Main navigation">
    <button class="nav-item active" data-view="dashboard" aria-label="Dashboard">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
      <span class="nav-item-label">Pit Lane</span>
    </button>

    <button class="nav-item" data-view="transactions" aria-label="Transactions">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      <span class="nav-item-label">History</span>
    </button>

    <!-- FAB: Add transaction -->
    <button class="nav-fab" data-view="add" aria-label="Add transaction">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>

    <button class="nav-item" data-view="simulator" aria-label="Simulator">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      <span class="nav-item-label">Grand Prix</span>
    </button>

    <button class="nav-item" data-view="patrimonio" aria-label="Patrimônio">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span class="nav-item-label">Garage</span>
    </button>
  </nav>
</div>

<!-- ── Settings Modal ──────────────────────────────────────── -->
<div id="settings-modal" class="modal-overlay hidden">
  <div class="modal-sheet" style="max-height:85dvh;overflow-y:auto">
    <div class="modal-handle"></div>
    <h2 class="modal-title">Settings</h2>

    <div class="divider-text">AI Receipt Scanning (optional)</div>
    <div class="form-group">
      <label class="form-label">Gemini API Key
        <span style="font-weight:400;color:var(--text-secondary)"> — free from aistudio.google.com</span>
      </label>
      <input type="password" id="settings-gemini-key" class="form-input" placeholder="AIza..." autocomplete="off" />
    </div>

    <div class="divider-text" style="margin-top:var(--space-lg)">Your Profile</div>

    <div class="form-group">
      <label class="form-label">Your name</label>
      <input type="text" id="settings-name" class="form-input" placeholder="Matthew" />
    </div>
    <div class="form-group">
      <label class="form-label">Current monthly salary (R$)</label>
      <input type="number" id="settings-salary" class="form-input" placeholder="7500" />
    </div>
    <div class="form-group">
      <label class="form-label">FGTS balance (R$)</label>
      <input type="number" id="settings-fgts" class="form-input" placeholder="68000" />
    </div>
    <div class="form-group">
      <label class="form-label">Car current value (R$)</label>
      <input type="number" id="settings-car-value" class="form-input" placeholder="50000" />
    </div>
    <div class="form-group">
      <label class="form-label">Total credit card debt (R$)</label>
      <input type="number" id="settings-debt-total" class="form-input" placeholder="14000" />
    </div>

    <div style="display:flex;gap:var(--space-md);margin-top:var(--space-xl)">
      <button class="btn btn-secondary" id="settings-cancel-btn" style="flex:1">Cancel</button>
      <button class="btn btn-primary" id="settings-save-btn" style="flex:1">Save</button>
    </div>

    <div class="divider-text" style="margin-top:var(--space-xl)">Install App</div>
    <div id="pwa-install-section" style="display:none;margin-bottom:var(--space-lg)">
      <p style="font-size:12px;color:var(--text-secondary);margin-bottom:var(--space-md)">
        Install Matt Money on your home screen for the best experience.
      </p>
      <button class="btn btn-primary" id="pwa-install-btn" style="width:100%">
        ⬇ Install App
      </button>
    </div>
    <p id="pwa-installed-msg" style="display:none;font-size:12px;color:var(--text-secondary);margin-bottom:var(--space-lg)">
      App is installed on your device.
    </p>

    <div class="divider-text" style="margin-top:var(--space-xl)">Data Backup</div>
    <p style="font-size:12px;color:var(--text-secondary);margin-bottom:var(--space-md)">
      Your data lives on this device. Export regularly so you never lose it.
    </p>
    <div style="display:flex;gap:var(--space-md)">
      <button class="btn btn-secondary" id="settings-export-btn" style="flex:1">
        ↓ Export backup
      </button>
      <label class="btn btn-secondary" style="flex:1;cursor:pointer;text-align:center">
        ↑ Import backup
        <input type="file" id="settings-import-file" accept=".json" style="display:none" />
      </label>
    </div>
  </div>
</div>

<!-- ── Transaction Detail Modal ────────────────────────────── -->
<div id="tx-detail-modal" class="modal-overlay hidden">
  <div class="modal-sheet" id="tx-detail-content">
    <div class="modal-handle"></div>
    <!-- Populated by JS -->
  </div>
</div>

<!-- ── Toast container ────────────────────────────────────── -->
<div class="toast-container" id="toast-container"></div>

<!-- ── Scripts ────────────────────────────────────────────── -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="js/utils/formatter.js"></script>
<script src="js/utils/storage.js"></script>
<script src="js/api.js"></script>
<script src="js/views/dashboard.js"></script>
<script src="js/views/add-transaction.js"></script>
<script src="js/views/transactions.js"></script>
<script src="js/views/simulator.js"></script>
<script src="js/views/patrimonio.js"></script>
<script src="js/app.js"></script>
</body>
</html>
