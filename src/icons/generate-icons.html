<!DOCTYPE html>
<!-- Run this page in a browser to generate the PWA icons. Right-click each canvas and save as PNG. -->
<html>
<body style="background:#0a0a0a;display:flex;gap:20px;padding:20px;flex-wrap:wrap">
<script>
function makeIcon(size) {
  const canvas = document.createElement('canvas');
  canvas.width = canvas.height = size;
  const ctx = canvas.getContext('2d');

  // Background
  const grad = ctx.createLinearGradient(0, 0, size, size);
  grad.addColorStop(0, '#b0001f');
  grad.addColorStop(1, '#e8002d');
  ctx.fillStyle = grad;
  const r = size * 0.2;
  ctx.beginPath();
  ctx.moveTo(r, 0); ctx.lineTo(size-r, 0); ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size-r); ctx.quadraticCurveTo(size, size, size-r, size);
  ctx.lineTo(r, size); ctx.quadraticCurveTo(0, size, 0, size-r);
  ctx.lineTo(0, r); ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fill();

  // Letter M
  ctx.fillStyle = 'white';
  ctx.font = `bold ${size * 0.55}px 'Arial Black', Arial`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('M', size/2, size/2 + size*0.04);

  // Red stripe at bottom
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fillRect(0, size * 0.8, size, size * 0.2);

  const label = document.createElement('p');
  label.textContent = size + 'x' + size;
  label.style.cssText = 'color:white;font-family:Arial;font-size:12px;margin:4px 0 0;text-align:center';

  const wrap = document.createElement('div');
  wrap.appendChild(canvas);
  wrap.appendChild(label);
  document.body.appendChild(wrap);

  return canvas;
}

[192, 512].forEach(s => makeIcon(s));
</script>
</body>
</html>
